# Ref: https://qiita.com/nojima/items/9bc576c922da3604a72b
set-option -g default-shell /bin/zsh

# Change prefix key
set -g prefix C-t
unbind C-b

# キーストロークのディレイを減らす
set -sg escape-time 1

# OSC 52 でシステムクリップボードにコピーする
set -g set-clipboard on

# プロンプト間ジャンプ(zsh の OSC 133 マーカーを利用)
# prefix + ↑/↓ で copy-mode に入りつつ前後のプロンプトへ
# copy-mode 内では M-↑/↓ で続けてジャンプ
bind-key Up   copy-mode \; send-keys -X previous-prompt
bind-key Down copy-mode \; send-keys -X next-prompt
bind-key -T copy-mode M-Up   send-keys -X previous-prompt
bind-key -T copy-mode M-Down send-keys -X next-prompt

# 設定ファイルをリロードする
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# | でペインを縦に分割する
bind | split-window -h

# - でペインを横に分割する(下 pane は 40% 高で開く)
bind - split-window -v -l 40%

# prefix + c: 新 window を作る + 下 40% に補助 shell pane を最初から split
bind c new-window \; split-window -v -l 40% \; select-pane -U

# ウィンドウを消したときに、自動で番号を詰める
set -g renumber-windows on

## ステータスバーを上部に表示する
set -g status-position top

# 256色 + true color。外側ターミナル(Ghostty 等)の RGB を活かす
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB,xterm-256color:RGB"

# ステータスバーの色を設定する
setw -g status-bg brightblue
# setw -g status-bg brightred
# setw -g status-bg green

# status-left のフォーマットを指定する
set-option -g status-left "#[fg=black,bg=brightblue] #S | "
# set-option -g status-left "#[fg=black,bg=brightred] #S | "
# set-option -g status-left "#[fg=black,bg=green] #S | "

# ウィンドウリストの色を設定する
setw -g window-status-style bg="brightblue",fg="black","dim"
# setw -g window-status-style bg="brightred",fg="black","dim"
# setw -g window-status-style bg="green",fg="black","dim"

# アクティブなウィンドウを目立たせる
setw -g window-status-current-style bg="red",fg="white","bright"

# ペインボーダーの色を設定する
set -g pane-border-style bg="black",fg="brightblue"
# set -g pane-border-style bg="black",fg="brightred"
# set -g pane-border-style bg="black",fg="green"

# アクティブなペインを目立たせる
set -g pane-active-border-style bg="yellow",fg="white"

# Plugins (tpm)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'hiroppy/tmux-agent-sidebar'
set -g @sidebar_width 25%

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
