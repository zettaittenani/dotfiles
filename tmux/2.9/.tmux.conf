# Ref: https://qiita.com/nojima/items/9bc576c922da3604a72b
set-option -g default-shell /bin/zsh

# Change prefix key
set -g prefix C-t
unbind C-b

# キーストロークのディレイを減らす
set -sg escape-time 1

# Pin the emacs copy-mode key bindings. tmux(1) auto-selects vi when
# $EDITOR / $VISUAL contains "vi" — this repo sets EDITOR=vim so that
# path kicks in and disables M-v / C-v page-up / page-down.
set -g mode-keys emacs

# OSC 52 でシステムクリップボードにコピーする
set -g set-clipboard on

# プロンプト間ジャンプ(zsh の OSC 133 マーカーを利用)
# prefix + ↑/↓ で copy-mode に入りつつ前後のプロンプトへ
# copy-mode 内では M-↑/↓ で続けてジャンプ
bind-key Up   copy-mode \; send-keys -X previous-prompt
bind-key Down copy-mode \; send-keys -X next-prompt
bind-key -T copy-mode M-Up   send-keys -X previous-prompt
bind-key -T copy-mode M-Down send-keys -X next-prompt

# 設定ファイルをリロードする
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# | でペインを縦に分割する
bind | split-window -h

# - でペインを横に分割する(下 pane は 40% 高で開く)
bind - split-window -v -l 40%

# prefix + c: 新 window を作る + 下 40% に補助 shell pane を最初から split
bind c new-window \; split-window -v -l 40% \; select-pane -U

# ウィンドウを消したときに、自動で番号を詰める
set -g renumber-windows on

## ステータスバーを上部に表示する
set -g status-position top

# 256色 + true color。外側ターミナル(Ghostty 等)の RGB を活かす
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB,xterm-256color:RGB"

# Modified Enter (Shift+Enter / Option+Enter 等)を CSI u で透過させる。
# pi などの CLI が修飾キーを検出できるようになる。
set -g extended-keys on
set -g extended-keys-format csi-u

# ステータスバーの色を設定する
setw -g status-bg brightblue

# status-left のフォーマットを指定する
# session 名は黒地チップにして青いタブ列と視覚的に分離する
set-option -g status-left "#[fg=brightblue,bg=black,bold] #S #[fg=black,bg=brightblue] "

# ウィンドウリストの色を設定する(dim だと黒文字が bg に溶けるので外して純黒に)
setw -g window-status-style bg="brightblue",fg="black"

# アクティブなウィンドウを目立たせる(深い赤地 + 純白の太字でコントラストを確保。
# 名前付き white は color7=薄いグレーなので RGB 指定で純白にする)
setw -g window-status-current-style bg="#c01030",fg="#ffffff",bold

# ペインボーダーの色を設定する
set -g pane-border-style bg="black",fg="brightblue"

# アクティブなペインを目立たせる
set -g pane-active-border-style bg="yellow",fg="white"

# Plugins (tpm)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'hiroppy/tmux-agent-sidebar'
set -g @sidebar_width 25%
# 通知は Claude Code hook 経由(クリックで該当 pane に飛べる)に寄せるため OFF
set -g @sidebar_notifications off

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
